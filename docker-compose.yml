services:
  postgres:
    image: postgres:18
    container_name: postgres-db
    hostname: postgres-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5445:5432"
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c track_io_timing=on
    volumes:
      - pgdata:/var/lib/postgresql/18/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: seq
    hostname: seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_FIRSTRUN_ADMINPASSWORD}
    ports:
      - "5341:5341"   # ingestion (HTTP)
      - "8080:80"     # Seq UI  →  http://seq:8080
    volumes:
      - seqdata:/data
    healthcheck:
      test:     ["CMD-SHELL", "curl -sf http://seq/api || exit 1"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    hostname: backend
    env_file:
        - ./backend/.env
        - ./backend/.env.production
    ports:
      - "4000:4000"
    volumes:
      - dpkeys:/var/lib/pgmonitor/keys
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    hostname: frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  pgdata:
  seqdata:
  dpkeys:
